<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMaster - Simple Task Management</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">
                    <i class="fas fa-tasks"></i>
                    TaskMaster
                </h1>
                <nav class="nav">
                    <button id="darkModeToggle" class="btn-icon" title="Toggle Dark Mode">
                        <i class="fas fa-moon"></i>
                    </button>
                    <button id="loginBtn" class="btn btn-outline">Login</button>
                    <button id="registerBtn" class="btn btn-primary">Register</button>
                    <div id="userInfo" class="user-info hidden">
                        <span id="username"></span>
                        <button id="logoutBtn" class="btn btn-outline">Logout</button>
                    </div>
                </nav>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <!-- Login/Register Forms -->
            <div id="authSection" class="auth-section">
                <div class="auth-container">
                    <!-- Login Form -->
                    <div id="loginForm" class="auth-form">
                        <h2>Login</h2>
                        <form id="loginFormElement">
                            <div class="form-group">
                                <label for="loginEmail">Email</label>
                                <input type="email" id="loginEmail" required>
                            </div>
                            <div class="form-group">
                                <label for="loginPassword">Password</label>
                                <input type="password" id="loginPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-full">Login</button>
                        </form>
                        <p class="auth-switch">
                            Don't have an account? 
                            <button type="button" id="showRegister" class="link-button">Register here</button>
                        </p>
                    </div>

                    <!-- Register Form -->
                    <div id="registerForm" class="auth-form hidden">
                        <h2>Register</h2>
                        <form id="registerFormElement">
                            <div class="form-group">
                                <label for="registerUsername">Username</label>
                                <input type="text" id="registerUsername" required>
                            </div>
                            <div class="form-group">
                                <label for="registerEmail">Email</label>
                                <input type="email" id="registerEmail" required>
                            </div>
                            <div class="form-group">
                                <label for="registerPassword">Password</label>
                                <input type="password" id="registerPassword" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-full">Register</button>
                        </form>
                        <p class="auth-switch">
                            Already have an account? 
                            <button type="button" id="showLogin" class="link-button">Login here</button>
                        </p>
                    </div>
                </div>
            </div>

            <!-- Task Management Section -->
            <div id="taskSection" class="task-section hidden">
                <div class="task-header">
                    <h2>My Tasks</h2>
                    <button id="addTaskBtn" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Add Task
                    </button>
                </div>

                <!-- Search Bar -->
                <div class="search-container">
                    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Search tasks...">
                </div>

                <!-- Sort Options -->
                <div class="sort-container">
                    <label for="taskSort" class="sort-label">Sort by:</label>
                    <select id="taskSort" class="sort-select">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="dueDate">Due Date</option>
                        <option value="priority">Priority (High to Low)</option>
                        <option value="category">Category</option>
                        <option value="title">Title (A-Z)</option>
                    </select>
                </div>

                <!-- Statistics Dashboard -->
                <div id="statsDashboard" class="stats-dashboard">
                    <div class="stat-card">
                        <div class="stat-icon total">📊</div>
                        <div class="stat-info">
                            <div class="stat-value" id="totalTasks">0</div>
                            <div class="stat-label">Total Tasks</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon completed">✅</div>
                        <div class="stat-info">
                            <div class="stat-value" id="completedTasks">0</div>
                            <div class="stat-label">Completed</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon pending">⏳</div>
                        <div class="stat-info">
                            <div class="stat-value" id="pendingTasks">0</div>
                            <div class="stat-label">Pending</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon overdue">🔴</div>
                        <div class="stat-info">
                            <div class="stat-value" id="overdueTasks">0</div>
                            <div class="stat-label">Overdue</div>
                        </div>
                    </div>
                </div>

                <!-- Add Task Form -->
                <div id="addTaskForm" class="add-task-form hidden">
                    <h3>Add New Task</h3>
                    <form id="taskFormElement">
                        <div class="form-group">
                            <label for="taskTitle">Task Title</label>
                            <input type="text" id="taskTitle" required>
                        </div>
                        <div class="form-group">
                            <label for="taskDescription">Description</label>
                            <textarea id="taskDescription" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="taskPriority">Priority</label>
                            <select id="taskPriority" class="form-select">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="taskDueDate">Due Date (Optional)</label>
                            <input type="date" id="taskDueDate" class="form-input">
                        </div>
                        <div class="form-group">
                            <label for="taskCategory">Category</label>
                            <select id="taskCategory" class="form-select">
                                <option value="work">💼 Work</option>
                                <option value="personal">👤 Personal</option>
                                <option value="shopping">🛒 Shopping</option>
                                <option value="health">🏥 Health</option>
                                <option value="finance">💰 Finance</option>
                                <option value="other" selected>📌 Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="taskNotes">Notes (Optional)</label>
                            <textarea id="taskNotes" rows="4" placeholder="Add any additional notes or details..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Subtasks (Optional)</label>
                            <div id="subtasksContainer" class="subtasks-container">
                                <!-- Subtasks will be added dynamically -->
                            </div>
                            <button type="button" id="addSubtaskBtn" class="btn btn-outline btn-sm">
                                <i class="fas fa-plus"></i> Add Subtask
                            </button>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Add Task</button>
                            <button type="button" id="cancelTaskBtn" class="btn btn-outline">Cancel</button>
                        </div>
                    </form>
                </div>

                <!-- Edit Task Form -->
                <div id="editTaskForm" class="add-task-form hidden">
                    <h3>Edit Task</h3>
                    <form id="editTaskFormElement">
                        <div class="form-group">
                            <label for="editTaskTitle">Task Title</label>
                            <input type="text" id="editTaskTitle" required>
                        </div>
                        <div class="form-group">
                            <label for="editTaskDescription">Description</label>
                            <textarea id="editTaskDescription" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="editTaskPriority">Priority</label>
                            <select id="editTaskPriority" class="form-select">
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="editTaskDueDate">Due Date (Optional)</label>
                            <input type="date" id="editTaskDueDate" class="form-input">
                        </div>
                        <div class="form-group">
                            <label for="editTaskCategory">Category</label>
                            <select id="editTaskCategory" class="form-select">
                                <option value="work">💼 Work</option>
                                <option value="personal">👤 Personal</option>
                                <option value="shopping">🛒 Shopping</option>
                                <option value="health">🏥 Health</option>
                                <option value="finance">💰 Finance</option>
                                <option value="other">📌 Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="editTaskNotes">Notes (Optional)</label>
                            <textarea id="editTaskNotes" rows="4" placeholder="Add any additional notes or details..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Subtasks (Optional)</label>
                            <div id="editSubtasksContainer" class="subtasks-container">
                                <!-- Subtasks will be added dynamically -->
                            </div>
                            <button type="button" id="addEditSubtaskBtn" class="btn btn-outline btn-sm">
                                <i class="fas fa-plus"></i> Add Subtask
                            </button>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                            <button type="button" id="cancelEditTaskBtn" class="btn btn-outline">Cancel</button>
                        </div>
                    </form>
                </div>

                <!-- Task List -->
                <div id="taskList" class="task-list">
                    <!-- Tasks will be dynamically added here -->
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-clipboard-list"></i>
                    <h3>No tasks yet</h3>
                    <p>Start by adding your first task!</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading hidden">
        <div class="spinner"></div>
    </div>

    <!-- Message Toast -->
    <div id="messageToast" class="toast" role="status" aria-live="polite">
        <span id="messageText"></span>
        <button id="closeToast" type="button" class="toast-close" aria-label="Close notification">&times;</button>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 TaskMaster. Built with ❤️ using MERN Stack</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/auth.js" defer></script>
    <script src="js/dark-mode.js" defer></script>
    <script src="js/tasks.js" defer></script>
    <script src="js/main.js" defer></script>
</body>
</html>
